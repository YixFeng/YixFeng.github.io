name: Update citation stats

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-citations:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Fetch Google Scholar citation stats
        run: python scripts/update_citations.py --user gfAtyY4AAAAJ --output data/citations.json

      - name: Commit updated citation stats
        run: |
          if git diff --quiet -- data/citations.json; then
            echo "Citation stats are already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/citations.json
          git commit -m "Update citation stats"
          git push
